x-common: &common
  restart: unless-stopped
  dns:
    - 8.8.8.8
    - 1.1.1.1
  networks:
    - bgp_net

services:
  # ─── Infraestrutura ─────────────────────────────────────────────────────────
  postgres:
    <<: *common
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bgp_mining}
      POSTGRES_USER: ${POSTGRES_USER:-bgp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bgp} -d ${POSTGRES_DB:-bgp_mining}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Scheduler ──────────────────────────────────────────────────────────────
  scheduler:
    <<: *common
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      COLLECTION_INTERVAL_MINUTES: ${COLLECTION_INTERVAL_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/scheduler.pid"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Worker ─────────────────────────────────────────────────────────────────
  worker:
    <<: *common
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-bgp_mining}
      POSTGRES_USER: ${POSTGRES_USER:-bgp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      HTTP_DELAY_SECONDS: ${HTTP_DELAY_SECONDS:-1}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-30}
      MAX_RETRIES: ${MAX_RETRIES:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Dashboard ──────────────────────────────────────────────────────────────
  dashboard:
    <<: *common
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-bgp_mining}
      POSTGRES_USER: ${POSTGRES_USER:-bgp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-Acesso14}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8501"
    depends_on:
      postgres:
        condition: service_healthy

networks:
  bgp_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
